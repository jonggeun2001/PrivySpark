rules:
  - pii_type: name
    regex: '[가-힣]{2,4}'
  - pii_type: phone_number
    regex: '01[016789]-?[0-9]{3,4}-?[0-9]{4}'
  - pii_type: email
    regex: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}'
  - pii_type: resident_registration_number
    regex: '[0-9]{6}-?[1-4][0-9]{6}'
  - pii_type: address
    regex: '[가-힣0-9\- ]+(시|도) [가-힣0-9\- ]+(구|군|시) [가-힣0-9\- ]+(로|길) [0-9\-]+'
  - pii_type: bank_account_number
    regex: '[0-9]{2,4}-[0-9]{2,6}-[0-9]{2,6}'
  - pii_type: credit_card_number
    regex: '[0-9]{4}-?[0-9]{4}-?[0-9]{4}-?[0-9]{4}'
  - pii_type: passport_number
    regex: '[MSROD][0-9]{8}'
  - pii_type: ip_address
    regex: '(25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])(\\.(25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])){3}'
