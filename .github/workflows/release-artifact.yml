name: Release Artifact

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Shadow Jar
        run: ./gradlew clean shadowJar

      - name: Resolve release tag
        id: meta
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        id: assets
        run: |
          shopt -s nullglob
          jars=(build/libs/*-all.jar)
          if [ ${#jars[@]} -ne 1 ]; then
            echo "Expected exactly one shadow jar in build/libs, found: ${#jars[@]}" >&2
            exit 1
          fi

          asset_jar="build/libs/privyspark-${{ steps.meta.outputs.tag }}-all.jar"
          cp "${jars[0]}" "$asset_jar"
          sha256sum "$asset_jar" > "${asset_jar}.sha256"

          echo "asset_jar=$asset_jar" >> "$GITHUB_OUTPUT"
          echo "asset_sha=${asset_jar}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privyspark-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.assets.outputs.asset_jar }}
            ${{ steps.assets.outputs.asset_sha }}

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.commit_sha }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.asset_jar }}
            ${{ steps.assets.outputs.asset_sha }}
          fail_on_unmatched_files: true
